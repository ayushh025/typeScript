<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>
  <body>
    <!-- Slider - 1 -->
    <div class="container">
      <button id="prev"><i class="fa-solid fa-circle-chevron-left"></i></button>
      <div class="slider">
        <div class="slides">
          <img
            src="https://www.thecookierookie.com/wp-content/uploads/2023/09/cheeseburger-sliders-featured.jpg"
            class="img-1"
            alt=""
          />
        </div>
        <div class="slides">
          <img
            src="https://png.pngtree.com/png-clipart/20250415/original/pngtree-delicious-burger-image-burgur-fast-food-junk-png-image_20796462.png"
            class="img-1"
            alt=""
          />
        </div>
        <div class="slides">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRL7JE631sIZaN3sooaYAV54ZXLXRS_qEnD7A&s"
            alt=""
            class="img-1"
          />
        </div>
        <div class="slides">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBSgiwpvP5rZoillt_LdCdODsAqnc21D4Grw&s"
            alt=""
            class="img-1"
          />
        </div>
        <div class="slides">
          <img
            src="https://www.halfbakedharvest.com/wp-content/uploads/2024/07/Pull-Apart-Cheeseburger-Sliders-1-scaled.jpg"
            alt=""
            class="img-1"
          />
        </div>

        <div class="slides">
          <img
            src="https://www.tasteofhome.com/wp-content/uploads/2018/01/Homemade-Pizza_EXPS_FT23_376_EC_120123_3.jpg"
            alt=""
            class="img-1"
          />
        </div>
        <div class="slides">
          <img
            src="https://www.vindulge.com/wp-content/uploads/2023/02/Pizza-with-Jalapeno-Coppa-and-Hot-Honey.jpg"
            alt=""
            class="img-1"
          />
        </div>
        <div class="slides">
          <img
            src="https://static.toiimg.com/thumb/56933159.cms?imgsize=686279&width=800&height=800"
            alt=""
            class="img-1"
          />
        </div>
        <div class="slides">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQoYWUM5Lpw8wwHe5aK6e9R4o1OOwI4XRsPLg&s"
            alt=""
            class="img-1"
          />
        </div>
        <div class="slides">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNWnp4U8pYWYfmbClNo3XEDXAzcbM3btOMbA&s"
            alt=""
            class="img-1"
          />
        </div>
      </div>
      <button id="next">
      <i class="fa-solid fa-circle-chevron-right"></i>
      </button>
    </div>
    <!-- Slider - 2 -->
    <div class="slider-2">
      <button id="prev2"><i class="fa-solid fa-circle-chevron-left"></i></button>
      <img src="" id="img-2" alt="" />
      <button id="next2">
      <i class="fa-solid fa-circle-chevron-right"></i>
      </button>
    </div>
    <!-- Slider - 3 -->
    <div class="slider-3">
      <img src="" id="img-3" alt="" />
    </div>
    <script src="script.js"></script>
  </body>
</html>
